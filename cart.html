<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — AreaMart</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<header class="topbar" id="topbar"></header>

<section class="section">
  <div class="container">
    <div class="section-head">
      <div class="eyebrow">Review your items</div>
      <h1 class="section-title">Your Cart</h1>
    </div>

    <div id="cartEmpty" class="empty hidden">
      <div class="icon">🛒</div>
      <div class="title">Your cart is empty</div>
      <p class="text-sm mt-sm">Head back to the shop to add items.</p>
      <a href="index.html" class="btn btn-secondary mt-md">Browse products</a>
    </div>

    <div id="cartContent" class="hidden">
      <div style="display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start;">

        <div class="panel">
          <div id="cartLines"></div>
        </div>

        <div>
          <div class="panel">
            <div class="eyebrow" style="margin-bottom:.8rem">Order summary</div>
            <div id="cartSummary"></div>

            <div class="field mt-md">
              <label>Delivery option</label>
              <select id="deliveryOption" onchange="renderCart()">
                <option value="200">Standard delivery — ₦200</option>
                <option value="0">Pickup (no delivery fee)</option>
              </select>
            </div>

            <div class="field">
              <label>Delivery address</label>
              <textarea id="deliveryAddress" rows="2" placeholder="Enter your delivery address..."></textarea>
            </div>

            <div class="field">
              <label>Additional notes (optional)</label>
              <input type="text" id="orderNotes" placeholder="e.g. Call when you arrive">
            </div>

            <button class="btn btn-primary btn-block mt-sm" id="checkoutBtn" onclick="checkout()">
              Pay with Paystack 🔒
            </button>
            <a href="index.html" class="btn btn-outline btn-block mt-sm">Continue Shopping</a>
            <p class="text-sm text-muted mt-sm" style="text-align:center">Secured by Paystack · SSL encrypted</p>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<script src="app.js"></script>
<script>
let effectiveDelivery = 200;

async function init() {
  await loadSession();
  if (!currentUser) {
    window.location.href = 'auth.html';
    return;
  }
  renderTopbar('cart');
  renderCart();
}

async function checkFirstOrderDiscount() {
  if (!currentUser) return false;
  if (cartTotal() < 5000) return false;
  const { count } = await sb
    .from('orders')
    .select('*', { count: 'exact', head: true })
    .eq('customer_id', currentUser.id)
    .neq('status', 'cancelled');
  return count === 0;
}

function renderCart() {
  const emptyEl = document.getElementById('cartEmpty');
  const contentEl = document.getElementById('cartContent');
  const cart = getCart();

  if (cart.length === 0) {
    emptyEl.classList.remove('hidden');
    contentEl.classList.add('hidden');
    return;
  }

  emptyEl.classList.add('hidden');
  contentEl.classList.remove('hidden');

  document.getElementById('cartLines').innerHTML = cart.map(item => `
    <div class="cart-line">
      <div class="img-sm">${emojiFor(item.category)}</div>
      <div class="info">
        <div class="name">${item.name}</div>
        <div class="unit-price">${formatNaira(item.price)} each</div>
      </div>
      <div class="qty-stepper">
        <button onclick="changeQty('${item.id}', ${item.qty - 1})">−</button>
        <span class="qty">${item.qty}</span>
        <button onclick="changeQty('${item.id}', ${item.qty + 1})">+</button>
      </div>
      <div class="subtotal">${formatNaira(item.price * item.qty)}</div>
      <button onclick="removeItem('${item.id}')" style="color:var(--red);font-size:1rem;padding:0.3rem;">✕</button>
    </div>
  `).join('');

  const subtotal = cartTotal();
  const deliverySelect = document.getElementById('deliveryOption');
  const selectedDelivery = deliverySelect ? parseInt(deliverySelect.value) : 200;

  checkFirstOrderDiscount().then(isFirstOrder => {
    const freeDelivery = isFirstOrder && selectedDelivery > 0 && subtotal >= 5000;
    effectiveDelivery = freeDelivery ? 0 : selectedDelivery;
    const deliveryLabel = deliverySelect ? deliverySelect.options[deliverySelect.selectedIndex].text.split(' —')[0] : 'Standard delivery';

    document.getElementById('cartSummary').innerHTML = `
      <div class="cart-summary-row"><span>Subtotal</span><span>${formatNaira(subtotal)}</span></div>
      ${freeDelivery
        ? `<div class="cart-summary-row" style="color:var(--green)">
             <span>🎉 First order — free delivery!</span>
             <span>-${formatNaira(selectedDelivery)}</span>
           </div>`
        : `<div class="cart-summary-row">
             <span>${deliveryLabel}</span>
             <span>${effectiveDelivery === 0 ? 'Free' : formatNaira(effectiveDelivery)}</span>
           </div>`
      }
      ${subtotal < 5000 && selectedDelivery > 0
        ? `<div class="text-sm" style="color:var(--terracotta);margin:.3rem 0 .6rem;">
             Add ${formatNaira(5000 - subtotal)} more for free first-order delivery!
           </div>`
        : ''
      }
      <div class="cart-summary-row total"><span>Total</span><span>${formatNaira(subtotal + effectiveDelivery)}</span></div>
    `;
  });
}

function changeQty(id, qty) { updateCartQty(id, qty); renderCart(); }
function removeItem(id) { removeFromCart(id); renderCart(); }

async function checkout() {
  if (!currentUser) {
    toast('Please sign in to place an order', 'error');
    setTimeout(() => window.location.href = 'auth.html', 1000);
    return;
  }
  const deliveryOption = parseInt(document.getElementById('deliveryOption').value);
  const address = document.getElementById('deliveryAddress').value.trim();
  if (!address && deliveryOption > 0) {
    toast('Please enter your delivery address', 'error');
    return;
  }
  const notes = document.getElementById('orderNotes').value.trim();
  const total = cartTotal() + effectiveDelivery;

  const handler = PaystackPop.setup({
    key: 'pk_test_c37cb0e6719b5af241fffb481d386de01bed0d24',
    email: currentUser.email,
    amount: total * 100,
    currency: 'NGN',
    ref: 'AM-' + Date.now(),
    callback: async function(response) {
      await createOrder(response.reference, total, address || 'Pickup', notes);
    },
    onClose: function() {
      toast('Payment cancelled', 'default');
    }
  });
  handler.openIframe();
}

async function createOrder(paymentRef, total, address, notes) {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spin"></span> Confirming...';

  const cart = getCart();

  const { data: order, error: orderErr } = await sb
    .from('orders')
    .insert({
      customer_id: currentUser.id,
      status: 'confirmed',
      total_amount: total,
      delivery_address: address,
      notes: notes || null,
    })
    .select()
    .single();

  if (orderErr) {
    toast('Payment received but order failed. Contact us: ref ' + paymentRef, 'error');
    btn.disabled = false;
    btn.textContent = 'Pay with Paystack 🔒';
    return;
  }

  await sb.from('order_items').insert(
    cart.map(i => ({ order_id: order.id, product_id: i.id, quantity: i.qty, unit_price: i.price }))
  );

  for (const item of cart) {
    await sb.rpc('decrement_stock', { p_id: item.id, qty: item.qty }).catch(() => {});
  }

  sessionStorage.removeItem('areamart_cart');
  updateCartBadge();
  toast('Order confirmed! 🎉', 'success');
  setTimeout(() => window.location.href = `orders.html?new=${order.id}`, 800);
}

init();
</script>
</body>
</html>
